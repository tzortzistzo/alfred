<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Alfred — Your personal trip document assistant.">
<title>Alfred</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F7FA;--surface:#FFF;
  --border:rgba(0,0,0,0.08);--border-med:rgba(0,0,0,0.14);
  --text:#16181D;--text2:#5A5E6B;--text3:#9498A8;
  --accent:#1D4ED8;--accent-mid:#1e40af;--accent-bg:#EFF6FF;
  --warn:#895500;--warn-bg:#FFF8ED;
  --danger:#B91C1C;--danger-bg:#FEF2F2;
  --ok:#166534;--ok-bg:#F0FDF4;
  --r:18px;--r-sm:11px;--r-xs:8px;
  --shadow:0 1px 2px rgba(0,0,0,0.05),0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg:0 4px 24px rgba(0,0,0,0.09),0 1px 3px rgba(0,0,0,0.05);
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:60px;background:rgba(245,247,250,0.93);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:9px;font-family:'DM Serif Display',serif;font-size:1.25rem;color:var(--text);text-decoration:none}
.nav-dot{width:9px;height:9px;background:var(--accent);border-radius:50%;box-shadow:0 0 0 3px rgba(15,48,152,0.15)}


.lang-btn.on{background:var(--accent);color:#fff;box-shadow:0 1px 4px rgba(15,48,152,0.25)}
.hero{padding:128px 2rem 56px;text-align:center;max-width:760px;margin:0 auto}
h1{font-family:'DM Serif Display',serif;font-size:clamp(2.6rem,5.5vw,4rem);line-height:1.06;letter-spacing:-0.03em;margin-bottom:2.5rem}
h1 em{font-style:italic;color:var(--accent)}
.form-wrap{max-width:700px;margin:0 auto 2.5rem;padding:0 1.25rem}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-lg);padding:2rem 2.25rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.field{display:flex;flex-direction:column;gap:5px}
.flbl{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase}
.ac-wrap{position:relative}
.fi{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color 0.15s,box-shadow 0.15s}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(15,48,152,0.10);background:#fff}
.fi::placeholder{color:var(--text3)}
.ac-list{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:500;background:var(--surface);border:1px solid var(--border-med);border-radius:var(--r-sm);max-height:210px;overflow-y:auto;box-shadow:var(--shadow-lg)}
.ac-list.open{display:block}
.ac-item{padding:10px 14px;font-size:13.5px;cursor:pointer;color:var(--text);border-bottom:1px solid var(--border);transition:background 0.1s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.hi{background:var(--accent-bg);color:var(--accent)}
.ac-item mark{background:none;color:var(--accent);font-weight:600;font-style:normal}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1rem}
.chip{padding:6px 14px;border-radius:100px;font-size:13px;border:1px solid var(--border-med);cursor:pointer;background:transparent;color:var(--text2);transition:all .12s;font-family:'DM Sans',sans-serif}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:500}
.run-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:1rem}
.run-btn:hover{background:var(--accent-mid);transform:translateY(-1px);box-shadow:0 4px 16px rgba(15,48,152,0.3)}
.run-btn:active{transform:translateY(0);box-shadow:none}
.run-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.disc{display:flex;gap:8px;align-items:flex-start;background:var(--warn-bg);border:1px solid rgba(137,85,0,0.12);border-radius:var(--r-xs);padding:10px 13px;margin-top:1rem}
.disc p{font-size:11.5px;color:var(--warn);line-height:1.55}
.results-wrap{max-width:700px;margin:0 auto 4rem;padding:0 1.25rem;display:none}
.results-wrap.show{display:block}
/* Traffic light */
.tl-bar{display:flex;align-items:center;gap:2rem;padding:13px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:10px;animation:up .3s ease both;flex-wrap:wrap}
.tl-label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.07em;text-transform:uppercase;margin-right:4px}
.tl-item{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--text2)}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tl-dot.green{background:#16A34A}
.tl-dot.amber{background:#D97706}
.tl-dot.red{background:#DC2626}
/* Route bar */
.route-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:14px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:10px;animation:up .3s ease .05s both}
.route-label{font-size:14px;font-weight:500;letter-spacing:-0.01em;display:flex;align-items:center;gap:8px}
.route-arr{color:var(--text3);font-size:20px;font-weight:300}
.sbadge{display:inline-flex;align-items:center;gap:7px;padding:7px 15px;border-radius:100px;font-size:13px;font-weight:500}
.sbadge.ok{background:var(--ok-bg);color:var(--ok);border:1px solid rgba(22,101,52,0.15)}
.sbadge.voa{background:#EFF6FF;color:#1D4ED8;border:1px solid rgba(29,78,216,0.15)}
.sbadge.evisa{background:#F5F3FF;color:#5B21B6;border:1px solid rgba(91,33,182,0.15)}
.sbadge.eta{background:#FFF7ED;color:#C2410C;border:1px solid rgba(194,65,12,0.2)}
.sbadge.req{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(185,28,28,0.15)}

/* Info table */
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);margin-bottom:10px;animation:up .3s ease .1s both}
.info-head{padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between;gap:1rem}
.info-head span{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.07em;text-transform:uppercase}
.info-table{width:100%;border-collapse:collapse}
.info-table tr{border-bottom:1px solid var(--border)}
.info-table tr:last-child{border-bottom:none}
.info-table td{padding:13px 20px;font-size:14px;vertical-align:middle;line-height:1.5}
.info-table td:first-child{color:var(--text3);font-size:11.5px;font-weight:500;width:36%;letter-spacing:0.02em;white-space:nowrap}
/* Value colours */
.v-red{color:#DC2626;font-weight:500}
.src-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.src-dot.cached{background:#1D4ED8}
.src-dot.ai{background:#DC2626}
.src-indicator{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);margin-left:auto}
.v-amber{color:#D97706;font-weight:500}
.v-green{color:#16A34A;font-weight:500}
.v-plain{color:var(--text)}
/* Tags */
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:500;margin-right:4px;vertical-align:middle}
.tag.red{background:var(--danger-bg);color:#DC2626}
.tag.amber{background:#FFF8ED;color:#D97706}
.tag.green{background:var(--ok-bg);color:#16A34A}
.tag.blue{background:var(--accent-bg);color:var(--accent)}
/* No data */
.nodata{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2.5rem;text-align:center;box-shadow:var(--shadow);animation:up .3s ease both}
.nodata h3{font-size:16px;font-weight:500;margin-bottom:.5rem}
.nodata p{font-size:13.5px;color:var(--text2);margin-bottom:1.5rem;line-height:1.65}
.src-links{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.src-link{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r-xs);background:var(--bg);border:1px solid var(--border-med);font-size:12.5px;color:var(--text2);text-decoration:none;transition:all .15s}
.src-link:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
/* How */
.how{max-width:700px;margin:0 auto 5rem;padding:0 1.25rem}
.sec-lbl{font-size:11.5px;font-weight:500;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;text-align:center;margin-bottom:.75rem}
.how h2{font-family:'DM Serif Display',serif;font-size:1.9rem;margin-bottom:2rem;text-align:center;letter-spacing:-0.02em}
.how-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.how-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem}
.how-num{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:.75rem}
.how-card h3{font-size:14.5px;font-weight:500;margin-bottom:.5rem}
.how-card p{font-size:13px;color:var(--text2);line-height:1.65}
.trust{max-width:700px;margin:0 auto 3rem;display:flex;align-items:center;justify-content:center;gap:2.5rem;flex-wrap:wrap;padding:0 1.25rem}
.ti{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--text3)}
.sherpa-btn:hover{background:#1e40af !important}
footer{border-top:1px solid var(--border);padding:2rem;text-align:center;color:var(--text3);font-size:12.5px;line-height:1.9}
footer a{color:var(--text2);text-decoration:none}
footer a:hover{color:var(--text)}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){
  nav{padding:0 1.25rem}
  .grid2{grid-template-columns:1fr}
  .how-grid{grid-template-columns:1fr}
  .trust{gap:1.25rem}
  .hero{padding:104px 1.25rem 48px}
  .info-table td:first-child{width:42%;font-size:11px}
  .tl-bar{gap:1rem}
}
</style>
</head>

function resolveInput(raw) {
  if (!raw) return "";
  const t = raw.trim();
  const up = t.toUpperCase();
  // Airport code
  if (AIRPORTS[up]) return AIRPORTS[up].n;
  // Country code (2 or 3 letter)
  if (CODE_MAP[up]) return CODE_MAP[up];
  // Exact country name
  const exact = COUNTRIES.find(c => c.toLowerCase() === t.toLowerCase());
  if (exact) return exact;
  // Starts with
  const starts = COUNTRIES.filter(c => c.toLowerCase().startsWith(t.toLowerCase()));
  if (starts.length === 1) return starts[0];

  if (AIRPORTS[q]) add(AIRPORTS[q].c + ', ' + AIRPORTS[q].n + ' (' + q + ')', AIRPORTS[q].n);
  // Exact country code match
  if (CODE_MAP[q]) add(CODE_MAP[q], CODE_MAP[q]);
  // Airport code starts with query
  Object.keys(AIRPORTS).forEach(code => {
    if (code !== q && code.startsWith(q)) {
      add(AIRPORTS[code].c + ', ' + AIRPORTS[code].n + ' (' + code + ')', AIRPORTS[code].n);
    }
  });
  // Country name starts with query
  COUNTRIES.forEach(c => { if (c.toLowerCase().startsWith(qLow)) add(c, c); });
  // Airport city contains query
  Object.keys(AIRPORTS).forEach(code => {
    const ap = AIRPORTS[code];
    if (ap.c.toLowerCase().includes(qLow)) add(ap.c + ', ' + ap.n + ' (' + code + ')', ap.n);
  });
  // Country name contains query
  COUNTRIES.forEach(c => { if (c.toLowerCase().includes(qLow)) add(c, c); });
  return results.slice(0, 8);
}

function highlight(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx < 0) return text;
  return text.slice(0,idx) + "<mark>" + text.slice(idx, idx+query.length) + "</mark>" + text.slice(idx+query.length);
}

function setupAC(inputId, listId, fieldKey) {
  const input = document.getElementById(inputId);
  const list = document.getElementById(listId);
  let hiIdx = -1;

  function showList(items, query) {
    if (!items.length) { list.classList.remove("open"); return; }
    list.innerHTML = items.map((item,i) => {
      const label = typeof item === 'object' ? item.label : item;
      const value = typeof item === 'object' ? item.value : item;
      return `<div class="ac-item" data-val="${value}" data-idx="${i}">${highlight(label, query)}</div>`;
    }).join("");
    list.classList.add("open");
    hiIdx = -1;
  }

  function selectItem(val) {
    input.value = val;
    fieldValues[fieldKey] = val;
    list.classList.remove("open");
    list.innerHTML = "";
    hiIdx = -1;
  }

  input.addEventListener("input", function() {
    fieldValues[fieldKey] = "";
    const q = this.value;
    if (!q.trim()) { list.classList.remove("open"); return; }
    const items = filterCountries(q);
    showList(items, q);
  });

  input.addEventListener("keydown", function(e) {
    const items = list.querySelectorAll(".ac-item");
    if (e.key === "ArrowDown") {
      e.preventDefault();
      hiIdx = Math.min(hiIdx+1, items.length-1);
      items.forEach((el,i) => el.classList.toggle("hi", i===hiIdx));
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      hiIdx = Math.max(hiIdx-1, 0);
      items.forEach((el,i) => el.classList.toggle("hi", i===hiIdx));
    } else if (e.key === "Enter") {
      e.preventDefault();
      if (hiIdx >= 0 && items[hiIdx]) selectItem(items[hiIdx].dataset.val);
      else {
        const resolved = resolveInput(this.value);
        if (resolved) selectItem(resolved);
      }
    } else if (e.key === "Escape") {
      list.classList.remove("open");
    }
  });

  input.addEventListener("blur", function() {
    setTimeout(() => {
      list.classList.remove("open");
      // resolve on blur
      const resolved = resolveInput(this.value);
      if (resolved) { fieldValues[fieldKey] = resolved; this.value = resolved; }
    }, 150);
  });

  list.addEventListener("mousedown", function(e) {
    const item = e.target.closest(".ac-item");
    if (item) selectItem(item.dataset.val);
  });
}

function initAC() {
  setupAC("from","from-list","from");
  setupAC("to","to-list","to");
  setupAC("passport","passport-list","passport");
  setupAC("via","via-list","via");
}

// ── ANALYZE ───────────────────────────────────────────
function analyze() {
  const passport = fieldValues.passport || resolveInput(document.getElementById("passport").value);
  const to       = fieldValues.to       || resolveInput(document.getElementById("to").value);
  const from     = fieldValues.from     || resolveInput(document.getElementById("from").value);
  const via      = fieldValues.via      || resolveInput(document.getElementById("via").value);

  if (!passport || !to) {
    alert(lang==="gr" ? "Επιλέξτε υπηκοότητα και προορισμό." : "Please select your passport nationality and destination.");
    return;
  }

  const purposeLow = purpose.toLowerCase();
  const isLongStay = purposeLow === 'work' || purposeLow === 'residence' || purposeLow === 'study';
  const isEUtoEU = EU.includes(passport) && EU.includes(to);

  let result;

  // Work/Study/Residence always requires a visa unless EU->EU free movement
  // Send to worker for specific requirements — never use tourism DB result
  if (isLongStay && !isEUtoEU) {
    if (WORKER_URL) {
      const btn = document.getElementById('runBtn');
      btn.disabled = true;
      document.getElementById('runBtnText').textContent = 'Checking...';
      fetch(WORKER_URL, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({passport: passport, destination: to, purpose: purpose})
      })
      .then(r => r.json())
      .then(data => {
        btn.disabled = false;
        document.getElementById('runBtnText').textContent = 'Check my documents';
        if (data.error) {
          renderResults({passport, from, to, via, result: {
            status:"required", days:null,
            notes:"Please contact the embassy directly for " + purpose.toLowerCase() + " visa requirements.",
            transit:"ok", transit_note:"", passport_validity:6,
            insurance:"recommended", insurance_note:"Recommended for all international travel."
          }});
        } else {
          const statusMap = {free:'free',eta:'eta',voa:'voa',evisa:'evisa',required:'required',forbidden:'forbidden'};
          renderResults({passport, from, to, via, result: {
            status: statusMap[data.status] || 'required',
            days: data.days || null,
            notes: data.notes || '',
            transit:'ok', transit_note:'',
            passport_validity: data.passport_validity_months || 6,
            insurance:'recommended', insurance_note:'Recommended for all international travel.',
            entry_form: data.entry_form || '',
            aiSource: true,
            fromCache: data.cached === true
          }});
        }
      })
      .catch((err) => {
        console.error("Worker fetch failed:", err);
        btn.disabled = false;
        document.getElementById('runBtnText').textContent = 'Check my documents';
        renderResults({passport, from, to, via, result: {
          status:"required", days:null,
          notes:"Please contact the embassy directly for " + purpose.toLowerCase() + " visa requirements.",
          transit:"ok", transit_note:"", passport_validity:6,
          insurance:"recommended", insurance_note:"Recommended for all international travel."
        }});
      });
      return;
    } else {
      result = {
        status: "required", days: null,
        notes: "Work, study, and residence visas must be obtained from the embassy or consulate before travel.",
        transit: "ok", transit_note: "", passport_validity: 6,
        insurance: "recommended", insurance_note: "Recommended for all international travel."
      };
    }
  } else if (isEUtoEU) {
    result = {
      status:"free", days:null,
      notes: t("euFreedom"),
      transit:"ok", transit_note:"",
      passport_validity:0,
      insurance:"recommended",
      insurance_note: "Recommended for all international travel."
    };
  } else {
    const passData = VISA_DB.visaData[passport];
    result = passData ? (passData[to] || null) : null;
  }

  // If DB has no result, call the worker
  if (!result && WORKER_URL) {
    const btn = document.getElementById('runBtn');
    btn.disabled = true;
    fetch(WORKER_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({passport: passport, destination: to, purpose: purpose})
    })
    .then(r => r.json())
    .then(data => {
      btn.disabled = false;
      if (data.error) {
        renderResults({passport, from, to, via, result: null});
      } else {
        const statusMap = {free:'free',eta:'eta',voa:'voa',evisa:'evisa',required:'required',forbidden:'forbidden'};
        const aiResult = {
          status: statusMap[data.status] || 'required',
          days: data.days || null,
          notes: data.notes || '',
          transit: 'ok',
          transit_note: '',
          passport_validity: data.passport_validity_months || 6,
          insurance: 'recommended',
          insurance_note: 'Recommended for all international travel.',
          entry_form: data.entry_form || '',
          aiSource: true,
          fromCache: data.cached === true
        };
        renderResults({passport, from, to, via, result: aiResult});
      }
    })
    .catch(() => {
      document.getElementById('runBtn').disabled = false;
      renderResults({passport, from, to, via, result: null});
    });
    return;
  }

  renderResults({passport, from, to, via, result});
}

    wrap.classList.add("show");
    wrap.scrollIntoView({behavior:"smooth",block:"start"});

  }

  const sc = SC[result.status] || SC.required;
  // For eta status, extract specific auth name from notes
  let pillLbl = t("pillLabel")[result.status] || result.status;
  if (result.status === "eta" && result.notes) {
    const notesUp = result.notes.toUpperCase();
    if (notesUp.includes("ESTA")) pillLbl = "ESTA required";
    else if (notesUp.includes("K-ETA")) pillLbl = "K-ETA required";
    else if (notesUp.includes("NZETA") || notesUp.includes("NZETA")) pillLbl = "NZeTA required";
    else if (notesUp.includes("EVISA") || notesUp.includes("E-VISA")) pillLbl = "eVisa required";
    else if (notesUp.includes("ETA")) pillLbl = "ETA required";
    else pillLbl = "Pre-travel auth";
  }

  // Check if ETA applies (mandatory pre-travel auth)
  const etaInfo = ETA_COUNTRIES[to];
  // Determine if notes contain ETA reference
  const notesHasEta = result.notes && /ETA|eTA|ESTA|NZeTA|eVisitor|eVisa/i.test(result.notes);

  // Max stay

  `;

  // Add Sherpa affiliate button if visa is needed
  if (result && ["required","evisa","voa","eta"].includes(result.status)) {
    const sherpaUrl = buildSherpaUrl(passport, to);
    if (sherpaUrl) {
